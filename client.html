<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書・請求書入力</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F9FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --ink: #1A202C;
  --ink-soft: #718096;
  --accent: #3B82F6;
  --danger: #EF4444;
  --success: #10B981;
}
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.header-sub {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 2px;
}
.body {
  padding: 2rem 1.5rem;
  max-width: 1080px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1rem;
}

/* 明細テーブル */
.table-scroll {
  width: 100%;
  overflow-x: auto;
}
.items-table {
  width: 100%;
  min-width: 860px;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 2px solid var(--border);
  color: var(--ink-soft);
  font-weight: 500;
  white-space: nowrap;
}
.items-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.items-table input {
  width: 100%;
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.items-table input:focus {
  border-color: var(--accent);
}
.items-table input[type="number"] {
  text-align: right;
}
.col-date    { width: 12%; }
.col-service { width: 21%; }
.col-qty     { width: 7%; }
.col-price   { width: 11%; }
.col-amount  { width: 11%; }
.col-tax     { width: 9%; }
.col-remark  { width: 19%; }
.col-delete  { width: 5%; text-align: center; }

.tax-presets {
  display: flex;
  gap: 3px;
  margin-top: 4px;
}
.tax-presets button {
  flex: 1;
  padding: 3px 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--ink-soft);
  font-size: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.tax-presets button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.delete-btn {
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: 4px;
}
.delete-btn:hover { color: var(--danger); }

.add-row-btn {
  margin-top: 1rem;
  padding: 8px 16px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  width: 100%;
}
.add-row-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* 合計エリア */
.totals {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 2px solid var(--border);
}
.total-row {
  display: flex;
  gap: 2rem;
  font-size: 13px;
  color: var(--ink-soft);
}
.total-row.grand {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  border-top: 1px solid var(--border);
  padding-top: 6px;
  margin-top: 2px;
}
.total-label { min-width: 140px; text-align: right; }
.total-value { min-width: 100px; text-align: right; }

/* アクションボタン */
.actions {
  display: flex;
  gap: 1rem;
  justify-content: flex-end;
}
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-secondary {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
}
.btn:hover { opacity: 0.85; }

/* ローディング・エラー */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--ink-soft);
  font-size: 14px;
}
.error-box {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  color: var(--danger);
  font-size: 14px;
}

/* 補足テキスト */
.hint {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 0.5rem;
}
</style>
<!-- Excel出力用ライブラリ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title" id="headerTitle">読み込み中...</div>
    <div class="header-sub">見積書・請求書入力</div>
  </div>
</div>

<div class="body" id="mainBody">
  <div class="loading">データを読み込んでいます...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATf8RjZ7y_wjiiPJ1VR9KXktbDPXuMpFo",
  authDomain: "idea-notebook-172e0.firebaseapp.com",
  projectId: "idea-notebook-172e0",
  storageBucket: "idea-notebook-172e0.firebasestorage.app",
  messagingSenderId: "682338340449",
  appId: "1:682338340449:web:598a4db429e148990e6420"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLのパラメータからクライアントIDを取得
const params = new URLSearchParams(window.location.search);
const clientId = params.get('id');

// メイン処理
async function init() {
  if (!clientId) {
    showError('クライアントIDが指定されていません。');
    return;
  }

  try {
    const snap = await getDoc(doc(db, 'clients', clientId));
    if (!snap.exists()) {
      showError(`クライアント「${clientId}」が見つかりません。`);
      return;
    }

    const client = snap.data();
    buildUI(client);
  } catch(e) {
    showError('データの読み込みに失敗しました：' + e.message);
  }
}

// 読み込んだクライアント設定（デフォルト税率などに使用）
let currentClient = null;

// UI構築
function buildUI(client) {
  currentClient = client;
  document.getElementById('headerTitle').textContent = client.clientName + ' 様';
  document.title = client.clientName + ' 様 | 見積書・請求書入力';

  const body = document.getElementById('mainBody');
  body.innerHTML = `
    <!-- 明細入力カード -->
    <div class="card">
      <p class="card-title">明細を入力</p>
      <div class="table-scroll">
        <table class="items-table">
          <thead>
            <tr>
              <th class="col-date">作業日</th>
              <th class="col-service">サービス名</th>
              <th class="col-qty">数量</th>
              <th class="col-price">単価（円）</th>
              <th class="col-amount">金額（円）</th>
              <th class="col-tax">税率（%）</th>
              <th class="col-remark">備考</th>
              <th class="col-delete"></th>
            </tr>
          </thead>
          <tbody id="itemsBody">
          </tbody>
        </table>
      </div>
      <p class="hint">
        作業日は「6/2」のような単日でも「6/2〜6/4」のような期間でも入力できます。数量と単価を入れると金額が自動計算されます（日割りできない場合は数量・単価を空欄のまま金額欄に直接金額を入力してください）。
        税率は10・8・0のボタンを押すだけで入力でき、それ以外の数値（例：1、15など）は欄に直接入力できます。0%にすると、その行は消費税を追加せず金額をそのまま合計に含めます（税込み・対象外として扱われます）。
      </p>
      <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>

      <!-- 合計（税率ごとに自動生成） -->
      <div class="totals" id="totalsArea"></div>
    </div>

    <!-- アクションボタン -->
    <div class="actions">
      <button class="btn btn-secondary" onclick="exportExcel()">Excelで保存</button>
      <button class="btn btn-primary" onclick="exportPDF()">PDF出力</button>
    </div>
  `;

  // 最初の1行を追加
  addRow();
}

// 今日の日付をyyyy-mm-dd形式で返す
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// 行を追加
let rowCount = 0;
window.addRow = function() {
  rowCount++;
  const id = 'row_' + rowCount;
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML = `
    <td class="col-date">
      <input type="text" placeholder="例：6/2 や 6/2〜6/4" autocomplete="off">
    </td>
    <td class="col-service">
      <input type="text" placeholder="例：エアコン洗浄" autocomplete="off">
    </td>
    <td class="col-qty">
      <input type="number" placeholder="" min="0" autocomplete="off"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-price">
      <input type="number" placeholder="" min="0" autocomplete="off"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-amount">
      <input type="number" placeholder="0" min="0" autocomplete="off"
        oninput="calcTotals()">
    </td>
    <td class="col-tax">
      <input type="number" placeholder="10" min="0" step="0.1" autocomplete="off"
        id="${id}_tax" oninput="calcTotals()">
      <div class="tax-presets">
        <button type="button" onclick="setTaxRate('${id}', 10)">10%</button>
        <button type="button" onclick="setTaxRate('${id}', 8)">8%</button>
        <button type="button" onclick="setTaxRate('${id}', 0)">0%</button>
      </div>
    </td>
    <td class="col-remark">
      <input type="text" placeholder="" autocomplete="off">
    </td>
    <td class="col-delete">
      <button class="delete-btn" onclick="deleteRow('${id}')">×</button>
    </td>
  `;
  document.getElementById('itemsBody').appendChild(tr);
  const defaultRate = (currentClient && currentClient.defaultTaxRate !== undefined && currentClient.defaultTaxRate !== null)
    ? currentClient.defaultTaxRate
    : 10;
  document.getElementById(id + '_tax').value = defaultRate;
  calcTotals();
};

// 税率プリセットボタンの処理
window.setTaxRate = function(id, rate) {
  const input = document.getElementById(id + '_tax');
  if (input) input.value = rate;
  calcTotals();
};

// 行の入力欄を名前で取得
function rowInputs(row) {
  const inputs = row.querySelectorAll('input');
  return {
    date: inputs[0],
    service: inputs[1],
    qty: inputs[2],
    price: inputs[3],
    amount: inputs[4],
    taxRate: inputs[5],
    remark: inputs[6],
  };
}

// 数量・単価が両方入力されていれば金額を自動計算
window.calcRow = function(id) {
  const row = document.getElementById(id);
  if (!row) return;
  const f = rowInputs(row);
  if (f.qty.value !== '' && f.price.value !== '') {
    const qty = parseFloat(f.qty.value) || 0;
    const price = parseFloat(f.price.value) || 0;
    f.amount.value = qty * price;
  }
  calcTotals();
};

// 税率ごとに金額をグループ化して集計する
function buildTaxGroups() {
  const rows = document.querySelectorAll('#itemsBody tr');
  const groups = new Map(); // rate(number) -> subtotal
  rows.forEach(row => {
    const f = rowInputs(row);
    const amount = parseFloat(f.amount.value) || 0;
    const rate = f.taxRate.value === '' ? 0 : (parseFloat(f.taxRate.value) || 0);
    groups.set(rate, (groups.get(rate) || 0) + amount);
  });
  // 税率の高い順に並べる（0%は最後）
  return [...groups.entries()].sort((a, b) => b[0] - a[0]);
}

// 合計を計算して表示
window.calcTotals = function() {
  const groups = buildTaxGroups();
  const totalsArea = document.getElementById('totalsArea');
  if (!totalsArea) return;

  let html = '';
  let grandTotal = 0;

  groups.forEach(([rate, subtotal]) => {
    const taxAmount = rate > 0 ? Math.floor(subtotal * (rate / 100)) : 0;
    grandTotal += subtotal + taxAmount;

    if (rate > 0) {
      html += `
        <div class="total-row">
          <span class="total-label">${formatRate(rate)}%対象小計</span>
          <span class="total-value">¥${subtotal.toLocaleString()}</span>
        </div>
        <div class="total-row">
          <span class="total-label">消費税（${formatRate(rate)}%）</span>
          <span class="total-value">¥${taxAmount.toLocaleString()}</span>
        </div>`;
    } else {
      html += `
        <div class="total-row">
          <span class="total-label">対象外・税込小計</span>
          <span class="total-value">¥${subtotal.toLocaleString()}</span>
        </div>`;
    }
  });

  html += `
    <div class="total-row grand">
      <span class="total-label">合計</span>
      <span class="total-value" id="grandTotal">¥${grandTotal.toLocaleString()}</span>
    </div>`;

  totalsArea.innerHTML = html;
};

// 税率の表示用フォーマット（不要な小数点を消す）
function formatRate(rate) {
  return Number(rate).toString();
}

// 行を削除
window.deleteRow = function(id) {
  const row = document.getElementById(id);
  if (row) {
    row.remove();
    calcTotals();
  }
};

// エラー表示
function showError(msg) {
  document.getElementById('headerTitle').textContent = 'エラー';
  document.getElementById('mainBody').innerHTML =
    `<div class="error-box">${msg}</div>`;
}

init();

// Excel出力
window.exportExcel = function() {
  const rows = document.querySelectorAll('#itemsBody tr');
  const name = document.getElementById('headerTitle')?.textContent || 'document';

  const data = [['作業日', 'サービス名', '数量', '単価（円）', '金額（円）', '税率（%）', '備考']];
  rows.forEach(row => {
    const f = rowInputs(row);
    data.push([
      f.date.value,
      f.service.value,
      f.qty.value === '' ? '' : parseFloat(f.qty.value) || 0,
      f.price.value === '' ? '' : parseFloat(f.price.value) || 0,
      parseFloat(f.amount.value) || 0,
      f.taxRate.value === '' ? 0 : parseFloat(f.taxRate.value) || 0,
      f.remark.value,
    ]);
  });

  data.push([]);
  const groups = buildTaxGroups();
  let grandTotal = 0;
  groups.forEach(([rate, subtotal]) => {
    const taxAmount = rate > 0 ? Math.floor(subtotal * (rate / 100)) : 0;
    grandTotal += subtotal + taxAmount;
    if (rate > 0) {
      data.push(['', '', '', '', '', `${formatRate(rate)}%対象小計`, '¥' + subtotal.toLocaleString()]);
      data.push(['', '', '', '', '', `消費税（${formatRate(rate)}%）`, '¥' + taxAmount.toLocaleString()]);
    } else {
      data.push(['', '', '', '', '', '対象外・税込小計', '¥' + subtotal.toLocaleString()]);
    }
  });
  data.push(['', '', '', '', '', '合計', '¥' + grandTotal.toLocaleString()]);

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 14 }, { wch: 24 }, { wch: 8 }, { wch: 12 }, { wch: 12 }, { wch: 10 }, { wch: 20 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '明細');
  XLSX.writeFile(wb, `${name}_${todayStr()}.xlsx`);
};

// PDF出力（Cloud Run + Puppeteer）
const PDF_SERVER = 'https://invoice-pdf-server-682338340449.asia-northeast1.run.app';

window.exportPDF = async function() {
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'PDF生成中...';
  btn.disabled = true;

  try {
    // 明細データを収集
    const rows = document.querySelectorAll('#itemsBody tr');
    const items = [];
    rows.forEach(row => {
      const f = rowInputs(row);
      items.push({
        workDate: f.date.value,
        service:  f.service.value,
        qty:      f.qty.value === '' ? null : parseFloat(f.qty.value) || 0,
        price:    f.price.value === '' ? null : parseFloat(f.price.value) || 0,
        amount:   parseFloat(f.amount.value) || 0,
        taxRate:  f.taxRate.value === '' ? 0 : parseFloat(f.taxRate.value) || 0,
        remark:   f.remark.value,
      });
    });

    const clientName = document.getElementById('headerTitle')?.textContent?.replace(' 様', '') || '';

    const payload = { clientName, items };

    const res = await fetch(`${PDF_SERVER}/generate-pdf`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'サーバーエラー');
    }

    // PDFをダウンロード
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${clientName}_${todayStr()}.pdf`;
    a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    alert('PDF生成に失敗しました：' + e.message);
  } finally {
    btn.textContent = 'PDF出力';
    btn.disabled = false;
  }
};
</script>

</body>
</html>
