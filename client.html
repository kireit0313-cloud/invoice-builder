<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書入力</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F9FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --ink: #1A202C;
  --ink-soft: #718096;
  --accent: #3B82F6;
  --danger: #EF4444;
  --success: #10B981;
  --warning: #F59E0B;
}
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.header {
  position: relative;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.header-left { display: flex; align-items: center; gap: 1rem; text-align: center; }
.back-btn {
  position: absolute;
  left: 1.5rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink-soft);
  cursor: pointer;
  display: none;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-title { font-size: 16px; font-weight: 500; color: var(--ink); }
.header-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.body {
  padding: 2rem 1.5rem;
  max-width: 1080px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1rem;
}
.common-badge {
  display: inline-block;
  margin-left: 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: #EFF6FF;
  border: 1px solid #BFDBFE;
  border-radius: 999px;
  padding: 2px 8px;
  vertical-align: middle;
  white-space: nowrap;
}

/* ===== 取引先一覧 ===== */
.partner-list { display: flex; flex-direction: column; gap: 8px; }
.partner-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  cursor: pointer;
  transition: border-color 0.15s;
}
.partner-item:hover { border-color: var(--accent); }
.partner-item.checked { border-color: var(--accent); background: #EFF6FF; }
.partner-checkbox { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
.partner-info { flex: 1; }
.partner-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.partner-meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.partner-delete-btn {
  background: var(--danger);
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.partner-delete-btn:hover { opacity: 0.85; }

.add-partner-area {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.add-partner-input {
  flex: 1 1 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.add-partner-input:focus { border-color: var(--accent); }
.add-partner-btn {
  padding: 10px 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.add-partner-btn:hover { opacity: 0.85; }

/* 一括操作バー */
.bulk-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  margin-bottom: 12px;
  background: #EFF6FF;
  border: 1px solid #BFDBFE;
  border-radius: 10px;
  font-size: 13px;
  color: var(--accent);
}
.bulk-bar-label { flex: 1; }
.bulk-pdf-btn {
  padding: 8px 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.bulk-pdf-btn:hover { opacity: 0.85; }
.bulk-pdf-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== 明細テーブル ===== */
.table-scroll { width: 100%; overflow-x: auto; }
.items-table {
  width: 100%;
  min-width: 860px;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 2px solid var(--border);
  color: var(--ink-soft);
  font-weight: 500;
  white-space: nowrap;
}
.items-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.items-table input {
  width: 100%;
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.items-table input:focus { border-color: var(--accent); }
.items-table input[type="number"] { text-align: right; }
.col-date    { width: 12%; }
.col-service { width: 21%; }
.col-qty     { width: 7%; }
.col-price   { width: 11%; }
.col-amount  { width: 11%; }
.col-tax     { width: 9%; }
.col-remark  { width: 19%; }
.col-delete  { width: 5%; text-align: center; }
.tax-presets { display: flex; gap: 3px; margin-top: 4px; }
.tax-presets button {
  flex: 1;
  padding: 3px 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--ink-soft);
  font-size: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.tax-presets button:hover { border-color: var(--accent); color: var(--accent); }
.delete-btn {
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: 4px;
}
.delete-btn:hover { color: var(--danger); }
.add-row-btn {
  margin-top: 1rem;
  padding: 8px 16px;
  background: #EFF6FF;
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  width: 100%;
}
.add-row-btn:hover { background: var(--accent); color: #fff; }

/* 合計エリア */
.totals {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 2px solid var(--border);
}
.total-row { display: flex; gap: 2rem; font-size: 13px; color: var(--ink-soft); }
.total-row.grand {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  border-top: 1px solid var(--border);
  padding-top: 6px;
  margin-top: 2px;
}
.total-label { min-width: 140px; text-align: right; }
.total-value { min-width: 100px; text-align: right; }

/* アクションボタン */
.actions { display: flex; gap: 1rem; justify-content: flex-end; }
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
/* 保存＝主要アクション（目立たせる）、PDF＝出力（赤）、バックアップ/復元＝控えめなアウトライン */
.btn-save { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,0.35); }
.btn-pdf { background: #D32F2F; color: #fff; }
.btn-outline { background: #fff; color: var(--ink); border: 1px solid var(--border); }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 自由記入欄 */
.free-fields { display: flex; flex-direction: column; gap: 10px; }
.free-field-row { display: flex; gap: 8px; align-items: center; }
.free-field-label {
  width: 140px;
  flex-shrink: 0;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.free-field-value {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.free-field-label:focus, .free-field-value:focus { border-color: var(--accent); }
.free-field-del {
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
}
.free-field-del:hover { color: var(--danger); }
.field-move-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 11px;
  line-height: 1;
  padding: 5px 6px;
  border-radius: 5px;
  flex-shrink: 0;
}
.field-move-btn:hover { border-color: var(--accent); color: var(--accent); }

/* スマホ専用改行：既定（PC）では改行しない（モバイル時のみ @media で表示） */
.br-sp { display: none; }

/* 会社情報編集：スマホ幅で項目名・内容を縦積みにする（▲▼と×は上段） */
@media (max-width: 480px) {
  #companyCustomFields .free-field-row {
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  #companyCustomFields .field-move-btn { order: 1; }
  #companyCustomFields .free-field-del {
    order: 2;
    margin-left: auto;
    font-size: 20px;
    padding: 4px 8px;
  }
  #companyCustomFields .free-field-label {
    order: 3;
    width: 100%;
    flex: 1 1 100%;
  }
  #companyCustomFields .free-field-value {
    order: 4;
    width: 100%;
    flex: 1 1 100%;
  }
  /* 自由項目記入欄（上段）：項目名を上段・内容＋×を下段に */
  #freeFieldsArea .free-field-row {
    flex-wrap: wrap;
    gap: 6px;
  }
  #freeFieldsArea .free-field-label {
    width: 100%;
    flex: 1 1 100%;
  }
  #freeFieldsArea .free-field-value {
    flex: 1 1 auto;
    min-width: 0;
  }
  /* ヘッダー：戻るボタンと取引先名の重なりを解消（縦積み） */
  .header-left {
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }
  .back-btn {
    position: static;
    transform: none;
    align-self: flex-start;
  }
  /* スマホのみ改行させる <br class="br-sp"> */
  .br-sp { display: inline; }
  /* 一括操作バー：スマホ幅で縦積み・ボタン全幅にして崩れを防ぐ */
  .bulk-actions-bar {
    flex-direction: column;
    align-items: stretch;
    gap: 0.6rem;
  }
  .bulk-actions-bar .bulk-progress {
    text-align: center;
    order: -1;
  }
  .bulk-actions-bar #bulkSaveBtn,
  .bulk-actions-bar .bulk-export-btn {
    width: 100%;
    text-align: center;
  }
}
.add-field-btn {
  padding: 7px 14px;
  background: #EFF6FF;
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  width: 100%;
  margin-top: 4px;
}
.add-field-btn:hover { background: var(--accent); color: #fff; }

/* 会社情報編集 */
.company-edit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.company-edit-grid label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 4px; }
.company-edit-grid input, .company-edit-grid textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.company-edit-grid input:focus, .company-edit-grid textarea:focus { border-color: var(--accent); }
.company-edit-grid input[readonly] { background: var(--bg); color: var(--ink-soft); cursor: not-allowed; }
.company-edit-full { grid-column: 1 / -1; }
/* 印鑑（角印）設定 */
.seal-toggle-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink); cursor: pointer; }
.seal-mode-row { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--ink); }
.seal-mode-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.seal-auto-preview {
  border: 2px solid #C0392B; border-radius: 3px;
  padding: 4px; display: flex; align-items: stretch; justify-content: center;
  overflow: hidden; background: #fff;
}
.seal-auto-preview-text {
  writing-mode: vertical-rl; text-orientation: upright; text-align: start; color: #C0392B;
  font-weight: bold; font-family: serif; line-height: 1.0; height: 100%;
}
.seal-img-preview { max-width: 72px; max-height: 72px; object-fit: contain; border: 1px solid var(--border); background: #fff; }
.theme-mode-row { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--ink); }
.theme-mode-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.theme-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.theme-swatch { width: 30px; height: 30px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; padding: 0; outline: 1px solid var(--border); }
.theme-swatch.active { border-color: var(--ink); }
.theme-color-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.theme-color-row input[type="color"] { width: 44px; height: 34px; padding: 0; border: 1px solid var(--border); border-radius: 6px; background: #fff; cursor: pointer; }
.theme-hex-input { width: 120px; }
.theme-preview-chip { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
.theme-preview-box { width: 22px; height: 22px; border-radius: 4px; outline: 1px solid var(--border); }
.company-save-btn {
  margin-top: 12px;
  padding: 9px 20px;
  background: var(--success);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.company-save-btn:hover { opacity: 0.85; }

/* ローディング・エラー */
.loading { text-align: center; padding: 3rem; color: var(--ink-soft); font-size: 14px; }
.error-box {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  color: var(--danger);
  font-size: 14px;
}
.hint { font-size: 12px; color: var(--ink-soft); margin-top: 0.5rem; }
.badge-imported {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  background: #D1FAE5;
  color: #065F46;
  border-radius: 20px;
  margin-left: 8px;
}
  /* ===== 一括編集モード ===== */
.bulk-edit-card {
  background: var(--surface);
  border: 1px solid #CBD5E0;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}
.bulk-edit-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  background: #6699CC;
  border-bottom: 1px solid #5580B8;
  user-select: none;
}
.bulk-edit-header:hover { background: #5C8CC2; }
.bulk-edit-header-left { display: flex; align-items: center; gap: 10px; }
.bulk-edit-partner-name { font-size: 14px; font-weight: 500; color: #fff; }
.bulk-edit-toggle { font-size: 12px; color: rgba(255,255,255,0.85); }
.bulk-edit-body { padding: 1rem 1.5rem 1.5rem; }
.bulk-edit-body.collapsed { display: none; }
.bulk-actions-bar {
  position: sticky;
  bottom: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  z-index: 10;
}
.bulk-progress { font-size: 13px; color: var(--ink-soft); }
.bulk-export-btn {
  padding: 12px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  cursor: pointer;
}
.bulk-export-btn:hover { opacity: 0.85; }
.bulk-export-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== カスタムポップアップ（確認ダイアログ） ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 1.5rem;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}
.modal-msg {
  font-size: 14px;
  color: var(--ink);
  white-space: pre-wrap;
  line-height: 1.6;
  margin-bottom: 1.25rem;
}
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn {
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.modal-btn-cancel { background: var(--bg); color: var(--ink); border: 1px solid var(--border); }
.modal-btn-ok { background: var(--accent); color: #fff; }
.modal-btn-danger { background: var(--danger); color: #fff; }
.modal-btn:hover { opacity: 0.85; }

/* ===== トースト通知 ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 90%;
  z-index: 1100;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
  opacity: 0;
  transition: opacity 0.2s;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
</style>
</head>

  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="showPartnerList()">← 取引先一覧</button>
    <div>

    </div>
  </div>
</div>

<div class="body" id="mainBody">
  <div class="loading">データを読み込んでいます...</div>
</div>

//  初期化
// =====================
async function init() {
  if (!clientId) { showError('クライアントIDが指定されていません。'); return; }
  try {
    const snap = await getDoc(doc(db, 'clients', clientId));
    if (!snap.exists()) { showError('クライアント情報が見つかりません。'); return; }
    currentClient = snap.data();
    document.getElementById('headerTitle').textContent = currentClient.clientName + ' 様';
    document.title = currentClient.clientName + ' 様';
    await showPartnerList();
  } catch(e) {
    showError('データの読み込みに失敗しました：' + e.message);
  }
}

//  取引先一覧画面

window.showPartnerList = async function() {
  currentPartner = null;
  currentPartnerId = null;
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = currentClient.clientName + ' 様';
  document.getElementById('headerSub').textContent = '請求書入力';

  // Firestoreから取引先一覧を取得
  const snap = await getDocs(collection(db, 'clients', clientId, 'partners'));
  partners = [];
  snap.forEach(d => partners.push({ id: d.id, ...d.data() }));
  partners.sort((a, b) => (a.partnerName || '').localeCompare(b.partnerName || '', 'ja'));

  renderPartnerList();
};

// チェック状態管理
const checkedIds = new Set();
function isChecked(id) { return checkedIds.has(id); }

// data属性からIDを取得してチェック切り替え
window.toggleCheckById = function(el) {
  const id = el.dataset.pid;
  if (!id) return;
  if (checkedIds.has(id)) checkedIds.delete(id);
  else checkedIds.add(id);
  const item = document.getElementById('pitem_' + id);
  if (item) item.classList.toggle('checked', checkedIds.has(id));
  updateBulkBar();
};
function updateBulkBar() {
  const label = document.getElementById('bulkLabel');
  const btn = document.getElementById('bulkEditBtn');
  if (!label || !btn) return;
  const cnt = checkedIds.size;
  if (cnt > 0) {
    label.textContent = cnt + '件選択中';
    btn.disabled = false;
  } else {
    label.textContent = 'チェックした取引先をまとめて編集できます';
    btn.disabled = true;
  }
}

// data属性からIDを取得して取引先を開く
window.openPartnerById = function(el) {
  const id = el.dataset.pid;
  if (!id) return;
  const partner = partners.find(p => p.id === id);
  if (!partner) return;
  currentPartner = partner;
  currentPartnerId = id;
  showDetailScreen(partner, partner.lineItems && partner.lineItems.length > 0);
};

// data属性からIDを取得して削除
window.deletePartnerById = async function(el) {
  const id = el.dataset.pid;
  if (!id) return;
  const partner = partners.find(p => p.id === id);
  const name = partner ? (partner.partnerName || '') : '';
  const ok = await showConfirm(`「${name}」を削除しますか？\nこの取引先のデータはすべて削除されます。`, { okText: '削除する', danger: true });
  if (!ok) return;
  try {
    await deleteDoc(doc(db, 'clients', clientId, 'partners', id));
    checkedIds.delete(id);
    partners = partners.filter(p => p.id !== id);
    renderPartnerList();
  } catch(e) {
    showToast('削除に失敗しました：' + e.message, 'error');
  }
};

// 取引先追加
window.addPartner = async function() {
  const nameInput = document.getElementById('newPartnerName');
  const name = nameInput.value.trim();
  const honorific = document.getElementById('newPartnerHonorific').value;
  const issueDay = document.getElementById('newPartnerIssueDay').value;
  if (!name) { showToast('取引先名を入力してください。', 'error'); return; }
  try {
    const ref = await addDoc(collection(db, 'clients', clientId, 'partners'), {
      partnerName: name,
      honorific: honorific,
      issueDay: issueDay,
      lineItems: [],
      freeFields: currentClient.projectFields || [],
      remarksLower: currentClient.remarksLower || '',
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    });
    // 一覧を更新して即座に開く
    await showPartnerList();
    const newPartner = partners.find(p => p.id === ref.id);
    if (newPartner) { currentPartner = newPartner; currentPartnerId = ref.id; showDetailScreen(newPartner, false); }
  } catch(e) {
    showToast('追加に失敗しました：' + e.message, 'error');
  }
};

// =====================
//  自由記入欄

window.addFreeField = function(label, value) {
  const area = document.getElementById('freeFieldsArea');
  if (!area) return;
  const id = 'ff_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const div = document.createElement('div');
  div.className = 'free-field-row';
  div.id = id;
  div.innerHTML = `
    <input type="text" class="free-field-label" placeholder="項目名（空欄可）" value="${escHtml(label)}" autocomplete="off">
    <input type="text" class="free-field-value" placeholder="内容" value="${escHtml(value)}" autocomplete="off">
    <button class="free-field-del" onclick="document.getElementById('${id}').remove()">×</button>
  `;
  area.appendChild(div);
};

function getFreeFields() {
  const rows = document.querySelectorAll('#freeFieldsArea .free-field-row');
  return [...rows].map(row => {
    const inputs = row.querySelectorAll('input');
    return { label: inputs[0].value, value: inputs[1].value };
  }).filter(f => f.label || f.value);
}

// =====================
//  明細行
// =====================
window.addRow = function(item) {
  rowCount++;
  const id = 'row_' + rowCount;
  const tr = document.createElement('tr');
  tr.id = id;
  const defaultRate = (currentClient && currentClient.defaultTaxRate !== undefined)
    ? currentClient.defaultTaxRate : 10;
  const taxVal  = item ? item.taxRate  : defaultRate;
  const dateVal = item ? (item.workDate || '') : '';
  const svcVal  = item ? (item.service  || '') : '';
  const qtyVal  = (item && item.qty !== null && item.qty !== undefined) ? item.qty : '';
  const priceVal= (item && item.price !== null && item.price !== undefined) ? item.price : '';
  const amtVal  = item ? (item.amount  || 0) : '';
  const remVal  = item ? (item.remark  || '') : '';

  tr.innerHTML = `
    <td class="col-date">
      <input type="text" value="${escHtml(String(dateVal))}" placeholder="" autocomplete="off">
    </td>
    <td class="col-service">
      <input type="text" value="${escHtml(String(svcVal))}" placeholder="" autocomplete="off">
    </td>
    <td class="col-qty">
      <input type="number" value="${qtyVal}" placeholder="" min="0" autocomplete="off"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-price">
      <input type="number" value="${priceVal}" placeholder="" min="0" autocomplete="off"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-amount">
      <input type="number" value="${amtVal}" placeholder="0" min="0" autocomplete="off"
        oninput="calcTotals()">
    </td>
    <td class="col-tax">
      <input type="number" value="${taxVal}" placeholder="10" min="0" step="1" autocomplete="off"
        id="${id}_tax" oninput="calcTotals()">
      <div class="tax-presets">
        <button type="button" onclick="setTaxRate('${id}', 10)">10%</button>
        <button type="button" onclick="setTaxRate('${id}', 8)">8%</button>
        <button type="button" onclick="setTaxRate('${id}', 0)">0%</button>
      </div>
    </td>
    <td class="col-remark">
      <input type="text" value="${escHtml(String(remVal))}" placeholder="" autocomplete="off">
    </td>
    <td class="col-delete">
      <button class="delete-btn" onclick="deleteRow('${id}')">×</button>
    </td>
  `;
  document.getElementById('itemsBody').appendChild(tr);
  calcTotals();
};

window.setTaxRate = function(id, rate) {
  const input = document.getElementById(id + '_tax');
  if (input) { input.value = rate; calcTotals(); }
};
window.calcRow = function(id) {
  const row = document.getElementById(id);
  if (!row) return;
  const f = rowInputs(row);
  if (f.qty.value !== '' && f.price.value !== '') {
    f.amount.value = (parseFloat(f.qty.value)||0) * (parseFloat(f.price.value)||0);
  }
  calcTotals();
};
window.deleteRow = function(id) {
  const row = document.getElementById(id);
  if (row) { row.remove(); calcTotals(); }
};

function rowInputs(row) {
  const inputs = row.querySelectorAll('input');
  return { date: inputs[0], service: inputs[1], qty: inputs[2],
           price: inputs[3], amount: inputs[4], taxRate: inputs[5], remark: inputs[6] };
}
function getLineItems() {
  return [...document.querySelectorAll('#itemsBody tr')].map(row => {
    const f = rowInputs(row);
    return {
      workDate: f.date.value,
      service:  f.service.value,
      qty:      f.qty.value === '' ? null : parseFloat(f.qty.value) || 0,
      price:    f.price.value === '' ? null : parseFloat(f.price.value) || 0,
      amount:   parseFloat(f.amount.value) || 0,
      taxRate:  f.taxRate.value === '' ? 0 : parseInt(f.taxRate.value) || 0,
      remark:   f.remark.value,
    };
  });
}

// =====================
//  合計計算
// =====================
function buildTaxGroups() {
  const rows = document.querySelectorAll('#itemsBody tr');
  const groups = new Map();
  rows.forEach(row => {
    const f = rowInputs(row);
    const amount = parseFloat(f.amount.value) || 0;
    const rate   = f.taxRate.value === '' ? 0 : (parseInt(f.taxRate.value) || 0);
    groups.set(rate, (groups.get(rate) || 0) + amount);
  });
  return [...groups.entries()].sort((a, b) => b[0] - a[0]);
}
window.calcTotals = function() {
  const groups = buildTaxGroups();
  const area   = document.getElementById('totalsArea');
  if (!area) return;
  let html = '', grandTotal = 0;
  groups.forEach(([rate, subtotal]) => {
    const tax = rate > 0 ? Math.floor(subtotal * (rate / 100)) : 0;
    grandTotal += subtotal + tax;
    if (rate > 0) {
      html += `<div class="total-row"><span class="total-label">${rate}%対象小計</span><span class="total-value">¥${subtotal.toLocaleString()}</span></div>
               <div class="total-row"><span class="total-label">消費税（${rate}%）</span><span class="total-value">¥${tax.toLocaleString()}</span></div>`;
    } else {
      html += `<div class="total-row"><span class="total-label">対象外・税込小計</span><span class="total-value">¥${subtotal.toLocaleString()}</span></div>`;
    }
  });
  html += `<div class="total-row grand"><span class="total-label">合計</span><span class="total-value">¥${grandTotal.toLocaleString()}</span></div>`;
  area.innerHTML = html;
};

// 内容保存（発行日・自由記入欄・明細をFirestoreに保存）
window.savePartnerData = async function() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    const items      = getLineItems();
    const freeFields = getFreeFields();
    const issueDate  = getIssueDate();
    const remarksLower = document.getElementById('remarksLowerInput').value.trim();
    const invoiceNo  = document.getElementById('invoiceNoInput').value.trim();
    await setDoc(doc(db, 'clients', clientId, 'partners', currentPartnerId), {
      partnerName: currentPartner.partnerName,
      issueDate:   issueDate,
      lineItems:   items,
      freeFields:  freeFields,
      remarksLower: remarksLower,
      invoiceNo:   invoiceNo,
      updatedAt:   serverTimestamp(),
    }, { merge: true });
    currentPartner.lineItems  = items;
    currentPartner.freeFields = freeFields;
    currentPartner.issueDate  = issueDate;
    currentPartner.remarksLower = remarksLower;
    currentPartner.invoiceNo  = invoiceNo;
    btn.textContent = '保存しました ✓';
    setTimeout(() => { btn.innerHTML = '内容<br class="br-sp">保存'; btn.disabled = false; }, 2000);
  } catch(e) {
    showToast('保存に失敗しました：' + e.message, 'error');
    btn.innerHTML = '内容<br class="br-sp">保存';
    btn.disabled = false;
  }
};
  
// =====================
//  PDF出力・Firestoreへ保存
// =====================
window.exportPDF = async function() {
  const btn = document.getElementById('pdfBtn');
  btn.textContent = 'PDF生成中...';
  btn.disabled = true;
  try {
    const items      = getLineItems();
    const freeFields = getFreeFields();
    const issueDate  = getIssueDate();
    const remarksLower = document.getElementById('remarksLowerInput').value.trim();
    const invoiceNo  = document.getElementById('invoiceNoInput').value.trim();
    const blob = await generatePDF(currentPartner.partnerName, items, freeFields, issueDate, currentPartner.honorific, remarksLower, invoiceNo);

    // ダウンロード
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download = `請求書_${currentPartner.partnerName}_${todayStr().replace(/-/g,'')}.pdf`;
    a.click();
    URL.revokeObjectURL(url);

    // Firestoreへ保存（次月の「先月データ」になる）
    await setDoc(doc(db, 'clients', clientId, 'partners', currentPartnerId), {
      partnerName: currentPartner.partnerName,
      lineItems:   items,
      freeFields:  freeFields,
      remarksLower: remarksLower,
      invoiceNo:   invoiceNo,
      updatedAt:   serverTimestamp(),
    }, { merge: true });

    currentPartner.lineItems  = items;
    currentPartner.freeFields = freeFields;
    currentPartner.remarksLower = remarksLower;
    currentPartner.invoiceNo  = invoiceNo;

  } catch(e) {
    showToast('PDF生成に失敗しました：' + e.message, 'error');
  } finally {
    btn.innerHTML = 'PDF<br class="br-sp">出力';
    btn.disabled = false;
  }
};

// PDF生成（Cloud Run）
async function generatePDF(partnerName, items, freeFields, issueDate, honorific, remarksLower, invoiceNo) {
  const payload = {
    clientName:   partnerName,
    items,
    docType:      '請求書',
    companyInfo:  currentClient?.companyInfo || null,
    projectFields: freeFields,
    remarksLower: remarksLower || '',
    issueDate:    issueDate || calcIssueDate('末日'),
    honorific:    honorific || '御中',
    columnLabels: getColumnLabels(),
    invoiceNo:    invoiceNo || '',
  };
  const res = await fetch(`${PDF_SERVER}/generate-pdf`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || 'サーバーエラー');
  }
  return await res.blob();
}

window.bulkSetTax = function(rid, tableId, totalsId, rate) {
  const input = document.getElementById(rid + '_tax');

};
window.bulkCalcRow = function(rid, tableId, totalsId) {
  const row = document.getElementById(rid);
  if (!row) return;
  const inputs = row.querySelectorAll('input');
  const qty = inputs[2], price = inputs[3], amount = inputs[4];
  if (qty.value !== '' && price.value !== '') {
    amount.value = (parseFloat(qty.value)||0) * (parseFloat(price.value)||0);
  }
  bulkCalcTotals(tableId, totalsId);
};
window.bulkDeleteRow = function(rid, tableId, totalsId) {
  const row = document.getElementById(rid);
  if (row) { row.remove(); bulkCalcTotals(tableId, totalsId); }
};
window.bulkCalcTotals = function(tableId, totalsId) {
  const tbody = document.getElementById(tableId);
  const area  = document.getElementById(totalsId);
  if (!tbody || !area) return;
  const groups = new Map();
  [...tbody.rows].forEach(row => {
    const inputs = row.querySelectorAll('input');
    const amount = parseFloat(inputs[4]?.value) || 0;
    const rate   = inputs[5]?.value === '' ? 0 : (parseInt(inputs[5]?.value) || 0);
    groups.set(rate, (groups.get(rate) || 0) + amount);
  });
  let html = '', grandTotal = 0;
  [...groups.entries()].sort((a,b) => b[0]-a[0]).forEach(([rate, subtotal]) => {
    const tax = rate > 0 ? Math.floor(subtotal * (rate/100)) : 0;
    grandTotal += subtotal + tax;
    if (rate > 0) {
      html += `<div class="total-row"><span class="total-label">${rate}%対象小計</span><span class="total-value">¥${subtotal.toLocaleString()}</span></div>
               <div class="total-row"><span class="total-label">消費税（${rate}%）</span><span class="total-value">¥${tax.toLocaleString()}</span></div>`;
    } else {
      html += `<div class="total-row"><span class="total-label">対象外・税込小計</span><span class="total-value">¥${subtotal.toLocaleString()}</span></div>`;
    }
  });
  html += `<div class="total-row grand"><span class="total-label">合計</span><span class="total-value">¥${grandTotal.toLocaleString()}</span></div>`;
  area.innerHTML = html;
};

function bulkGetLineItems(tableId) {
  const tbody = document.getElementById(tableId);
  if (!tbody) return [];
  return [...tbody.rows].map(row => {
    const inputs = row.querySelectorAll('input');
    return {
      workDate: inputs[0].value,
      service:  inputs[1].value,
      qty:      inputs[2].value === '' ? null : parseFloat(inputs[2].value) || 0,
      price:    inputs[3].value === '' ? null : parseFloat(inputs[3].value) || 0,
      amount:   parseFloat(inputs[4].value) || 0,
      taxRate:  inputs[5].value === '' ? 0 : parseInt(inputs[5].value) || 0,
      remark:   inputs[6].value,
    };
  });
}

window.bulkEditExport = async function() {
  const targets = window._bulkEditTargets || [];
  if (targets.length === 0) return;

  const btn = document.getElementById('bulkEditExportBtn');
  const progress = document.getElementById('bulkEditProgress');
  btn.disabled = true;
  btn.textContent = '出力中...';

  try {
    const zip = new JSZip();
    const docLabel = '請求書';
    const today = todayStr();

    for (let i = 0; i < targets.length; i++) {
      const p = targets[i];
      const tableId = 'betbl_' + p.id;
      progress.textContent = `PDF生成中... (${i+1}/${targets.length}) ${p.partnerName}`;

      const items = bulkGetLineItems(tableId);
      const freeFields = p.freeFields || [];
      const remarksLower = p.remarksLower || '';
      const issueDateBulk = p.issueDate || calcIssueDate(p.issueDay || '末日');
      const invoiceNo = document.getElementById('beinv_' + p.id)?.value.trim() ?? (p.invoiceNo || '');

      try {
        const blob = await generatePDF(p.partnerName, items, freeFields, issueDateBulk, p.honorific, remarksLower, invoiceNo);
        const buf  = await blob.arrayBuffer();
        zip.file(`${docLabel}_${p.partnerName}_${today}.pdf`, buf);

        // Firestoreへ保存（先月データ更新）
        await setDoc(doc(db, 'clients', clientId, 'partners', p.id), {
          partnerName: p.partnerName,
          lineItems:   items,
          freeFields:  freeFields,
          remarksLower: remarksLower,
          invoiceNo:   invoiceNo,
          updatedAt:   serverTimestamp(),
        }, { merge: true });
        p.invoiceNo = invoiceNo;

      } catch(e) {
        console.warn(`${p.partnerName} のPDF生成失敗:`, e.message);
      }
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download = `${docLabel}_一括出力_${today}.zip`;
    a.click();
    URL.revokeObjectURL(url);

    progress.textContent = '完了！';
    setTimeout(() => showPartnerList(), 1500);

  } catch(e) {
    showToast('一括PDF出力に失敗しました：' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '一括出力（PDF）ZIP';
  }
};

function getCompanyFields() {
  const c = currentClient?.companyInfo || {};
  if (Array.isArray(c.fields)) return c.fields;
  // レガシー移行：住所（見出しなし）→TEL→登録番号→追加項目 の順（従来の表示を維持）
  const legacy = [];
  if (c.address)       legacy.push({ label: '',       value: c.address });
  if (c.tel)           legacy.push({ label: 'TEL',    value: c.tel });
  if (c.invoiceNumber) legacy.push({ label: '登録番号', value: c.invoiceNumber });
  (c.customFields || []).forEach(f => {
    if (f && (f.label || f.value)) legacy.push({ label: f.label || '', value: f.value || '' });
  });
  return legacy;
}

    row.parentElement.insertBefore(row, row.previousElementSibling);

    row.parentElement.insertBefore(row.nextElementSibling, row);
  }
};

function sealAutoPreviewHtml(name) {
  if (!name) return '<span class="hint">社名が未設定のため生成できません。</span>';
  // PDF側（index.js）と同じ計算式：文字数に応じて枠を自動拡大し、フォントはマス目より小さくして余白確保
  const n = [...String(name)].length;
  const grid = Math.ceil(Math.sqrt(n));
  let box = grid * 18 + 12;
  if (box > 80) box = 80;
  if (box < 44) box = 44;
  const inner = box - 12;
  const font = Math.max(6, Math.min(15, Math.floor(inner / grid) - 3));
  return `<div class="seal-auto-preview" style="width:${box}px;height:${box}px"><div class="seal-auto-preview-text" style="font-size:${font}px">${escHtml(name)}</div></div>`;
}

function renderSealAutoPreview() {
  const box = document.getElementById('sealPreviewAuto');
  if (!box) return;
  box.innerHTML = sealAutoPreviewHtml(currentClient?.companyInfo?.name || '');
}

function renderSealImagePreview() {
  const box = document.getElementById('sealPreviewImage');
  if (!box) return;
  const d = window._sealImageData || '';
  box.innerHTML = d
    ? `<img src="${d}" class="seal-img-preview"><div><button class="add-field-btn" style="width:auto;margin-top:8px;" onclick="clearSealImage()">画像を削除</button></div>`
    : '<span class="hint">画像が未アップロードです。</span>';
}

function initSealPreviews() {
  const checked = document.querySelector('input[name="sealMode"]:checked');
  if (!checked) return;
  if (checked.value === 'image') renderSealImagePreview();
  else renderSealAutoPreview();
}

window.onSealEnabledChange = function() {
  const on = document.getElementById('sealEnabled').checked;
  document.getElementById('sealOptions').style.display = on ? '' : 'none';
};

window.onSealModeChange = function() {
  const mode = document.querySelector('input[name="sealMode"]:checked')?.value || 'auto';
  document.getElementById('sealAutoBox').style.display = mode === 'auto' ? '' : 'none';
  document.getElementById('sealImageBox').style.display = mode === 'image' ? '' : 'none';
  if (mode === 'auto') renderSealAutoPreview();
  else renderSealImagePreview();
};

window.clearSealImage = function() {
  window._sealImageData = '';
  const f = document.getElementById('sealFile');
  if (f) f.value = '';
  renderSealImagePreview();
};

window.handleSealUpload = function(ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const max = 300;
      let w = img.width, h = img.height;
      if (w >= h && w > max) { h = Math.round(h * max / w); w = max; }
      else if (h > w && h > max) { w = Math.round(w * max / h); h = max; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      window._sealImageData = canvas.toDataURL('image/png');
      renderSealImagePreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveSealInfo = async function() {
  const c = currentClient?.companyInfo || {};
  const enabled = document.getElementById('sealEnabled').checked;
  const mode = document.querySelector('input[name="sealMode"]:checked')?.value || 'auto';
  const imageData = mode === 'image' ? (window._sealImageData || '') : '';
  const updated = { ...c, seal: { enabled, mode, imageData } };
  try {
    await setDoc(doc(db, 'clients', clientId), {
      companyInfo: updated,
      updatedAt: serverTimestamp(),
    }, { merge: true });
    currentClient.companyInfo = updated;
    showToast('印鑑設定を保存しました。', 'success');
  } catch(e) {
    showToast('保存に失敗しました：' + e.message, 'error');
  }
};

// =====================
//  PDFの配色（会社カラー）設定
// =====================
// theme = { mode:'gray'|'color', color:'#hex' }。クライアント単位でcompanyInfoに保存。
// PDF側(index.js)がこのthemeを受け取り、グレー/カラーで配色を切り替える。
const THEME_PRESETS = [
  { name: 'ネイビー',   hex: '#185FA5' },
  { name: 'グリーン',   hex: '#0F6E56' },
  { name: 'レンガ',     hex: '#993C1D' },
  { name: 'パープル',   hex: '#5B4B8A' },
  { name: 'チャコール', hex: '#444441' },
];
function normalizeHex(v) {
  let s = String(v || '').trim();
  if (s && s[0] !== '#') s = '#' + s;
  if (/^#[0-9a-fA-F]{3}$/.test(s)) s = '#' + s.slice(1).split('').map(c => c + c).join('');
  return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toUpperCase() : null;
}
function buildThemeEditHTML() {
  const c = currentClient?.companyInfo || {};
  const theme = c.theme || {};
  const mode = theme.mode === 'color' ? 'color' : 'gray';
  const color = normalizeHex(theme.color) || '#185FA5';
  const swatches = THEME_PRESETS.map(p =>
    `<button type="button" class="theme-swatch${color.toUpperCase() === p.hex.toUpperCase() ? ' active' : ''}" style="background:${p.hex}" title="${p.name}" onclick="setThemePreset('${p.hex}')"></button>`
  ).join('');
  return `
    <div class="theme-mode-row">
      <label><input type="radio" name="themeMode" value="gray" ${mode==='gray'?'checked':''} onchange="onThemeModeChange()"> グレー（標準）</label>
      <label><input type="radio" name="themeMode" value="color" ${mode==='color'?'checked':''} onchange="onThemeModeChange()"> カラー選択</label>
    </div>
    <div id="themeColorOptions" style="${mode==='color'?'':'display:none;'}margin-top:12px;">
      <div class="theme-swatches">${swatches}</div>
      <div class="theme-color-row">
        <input type="color" id="cThemeColor" value="${color}" onchange="onThemePickerChange()" oninput="onThemePickerChange()">
        <input type="text" id="cThemeHex" class="theme-hex-input" value="${color}" placeholder="#185FA5" autocomplete="off" onchange="onThemeHexChange()">
        <span class="theme-preview-chip"><span class="theme-preview-box" id="themePreviewBox" style="background:${color}"></span>プレビュー</span>
      </div>
    </div>
    <button class="company-save-btn" onclick="saveThemeInfo()">配色を保存</button>
  `;
}
function initThemePreview() {
  updateThemePreviewChip();
}
function markActiveSwatch(hex) {
  const up = (hex || '').toUpperCase();
  document.querySelectorAll('.theme-swatch').forEach((b, i) => {
    b.classList.toggle('active', (THEME_PRESETS[i].hex.toUpperCase() === up));
  });
}
function updateThemePreviewChip() {
  const box = document.getElementById('themePreviewBox');
  const hex = normalizeHex(document.getElementById('cThemeHex')?.value) || '#185FA5';
  if (box) box.style.background = hex;
}
window.onThemeModeChange = function() {
  const mode = document.querySelector('input[name="themeMode"]:checked')?.value || 'gray';
  const opt = document.getElementById('themeColorOptions');
  if (opt) opt.style.display = mode === 'color' ? '' : 'none';
};
window.setThemePreset = function(hex) {
  const picker = document.getElementById('cThemeColor');
  const hexIn = document.getElementById('cThemeHex');
  if (picker) picker.value = hex;
  if (hexIn) hexIn.value = hex;
  markActiveSwatch(hex);
  updateThemePreviewChip();
};
window.onThemePickerChange = function() {
  const picker = document.getElementById('cThemeColor');
  const hexIn = document.getElementById('cThemeHex');
  if (picker && hexIn) hexIn.value = picker.value.toUpperCase();
  markActiveSwatch(picker?.value);
  updateThemePreviewChip();
};
window.onThemeHexChange = function() {
  const hexIn = document.getElementById('cThemeHex');
  const norm = normalizeHex(hexIn?.value);
  if (!norm) { showToast('カラーコードは #RRGGBB 形式で入力してください。', 'error'); return; }
  hexIn.value = norm;
  const picker = document.getElementById('cThemeColor');
  if (picker) picker.value = norm;
  markActiveSwatch(norm);
  updateThemePreviewChip();
};
window.saveThemeInfo = async function() {
  const c = currentClient?.companyInfo || {};
  const mode = document.querySelector('input[name="themeMode"]:checked')?.value === 'color' ? 'color' : 'gray';
  const color = normalizeHex(document.getElementById('cThemeHex')?.value) || '#185FA5';
  const updated = { ...c, theme: { mode, color } };
  try {
    await setDoc(doc(db, 'clients', clientId), {
      companyInfo: updated,
      updatedAt: serverTimestamp(),
    }, { merge: true });
    currentClient.companyInfo = updated;
    showToast('配色を保存しました。', 'success');
  } catch(e) {
    showToast('保存に失敗しました：' + e.message, 'error');
  }
};

// =====================
//  バックアップ書き出し／復元（取引先単位・JSON）
// =====================
// PDFは「請求書」、このJSONは「過去データの保管・復元用」。役割を分離している。
// 画面に表示中の内容をそのまま書き出す（＝見えている状態のバックアップ）。
window.exportBackup = function() {
  if (!currentPartner) return;
  const backup = {
    _type: 'invoice-builder-partner-backup',
    _version: 1,
    exportedAt: new Date().toISOString(),
    clientId: clientId,
    partnerId: currentPartnerId,
    partner: {
      partnerName:  currentPartner.partnerName || '',
      honorific:    currentPartner.honorific || '御中',
      issueDay:     currentPartner.issueDay || '末日',
      issueDate:    getIssueDate(),
      invoiceNo:    document.getElementById('invoiceNoInput')?.value.trim() || '',
      lineItems:    getLineItems(),
      freeFields:   getFreeFields(),
      remarksLower: document.getElementById('remarksLowerInput')?.value.trim() || '',
    },
  };
  const name = currentPartner.partnerName || 'partner';
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `バックアップ_${name}_${todayStr().replace(/-/g,'')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを書き出しました。', 'success');
};

window.triggerRestore = function() {
  const input = document.getElementById('restorePartnerFileInput');
  if (input) { input.value = ''; input.click(); }
};

window.handleRestoreFile = async function(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  let data;
  try {
    data = JSON.parse(await file.text());
  } catch (e) {
    showToast('ファイルを読み込めませんでした（JSON形式ではありません）。', 'error');
    return;
  }
  if (!data || data._type !== 'invoice-builder-partner-backup' || !data.partner) {
    showToast('この取引先のバックアップファイルではありません。', 'error');
    return;
  }
  const bp = data.partner;
  const fromName = bp.partnerName || '（名前なし）';
  const curName = currentPartner?.partnerName || '（名前なし）';
  const mismatch = fromName !== curName;

  let msg, okText;
  if (mismatch) {
    // 取引先名が違う＝ファイルの取り違えの可能性。強めに警告する。
    msg = `⚠️ 取引先名が一致しません。\n・バックアップ：${fromName}\n・いま開いている取引先：${curName}\n\n別の取引先の内容で上書きしようとしています。ファイルを間違えていないか確認してください。\n\n復元しても、この時点では画面に反映されるだけです。「内容保存」ボタンを押すまで確定しません。\nそれでも復元しますか？`;
    okText = 'それでも復元する';
  } else {
    msg = `バックアップ「${fromName}」の内容で、いま開いている取引先の明細・自由項目・備考・請求書番号・発行日を差し替えます。\n\nこの時点では画面に反映されるだけです。「内容保存」ボタンを押すまで確定しません。\nよろしいですか？`;
    okText = '復元する';
  }
  const ok = await showConfirm(msg, { okText, danger: mismatch });
  if (!ok) return;

  // 現在の取引先（識別情報）は保持し、請求書の中身だけ差し替える
  currentPartner.lineItems   = Array.isArray(bp.lineItems) ? bp.lineItems : [];
  currentPartner.freeFields  = Array.isArray(bp.freeFields) ? bp.freeFields : [];
  currentPartner.remarksLower = bp.remarksLower || '';
  currentPartner.invoiceNo   = bp.invoiceNo || '';
  if (bp.issueDate) currentPartner.issueDate = bp.issueDate;

  showDetailScreen(currentPartner, true);
  showToast('復元しました。内容を確認して「内容保存」または「PDF出力」してください。', 'success');
};

// =====================
//  ユーティリティ
// =====================
// 締め日パターンから発行日文字列を生成
function calcIssueDate(issueDay) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth(); // 0-indexed
  if (issueDay === '末日') {
    const lastDay = new Date(y, m + 1, 0).getDate();
    return `${y}年${m + 1}月${lastDay}日`;
  }
  const day = parseInt(issueDay, 10);
  if (!isNaN(day)) {
    return `${y}年${m + 1}月${day}日`;
  }
  // 手入力 or 不明な場合は今日の日付を返す
  const d = now.getDate();
  return `${y}年${m + 1}月${d}日`;
}
  // 発行日の「変更」ボタン
window.toggleIssueDateEdit = function() {
  const input = document.getElementById('issueDateCustom');
  if (input.style.display === 'none') {
    input.style.display = 'inline-block';
    if (!input.value) input.value = document.getElementById('issueDateDisplay').textContent;
  } else {
    input.style.display = 'none';
    if (input.value.trim()) {
      document.getElementById('issueDateDisplay').textContent = input.value.trim();
    }
  }
};

// 手入力欄の変更をリアルタイム反映
window.updateIssueDateDisplay = function() {
  const val = document.getElementById('issueDateCustom').value.trim();
  if (val) document.getElementById('issueDateDisplay').textContent = val;
};

// 現在の発行日を取得（PDF生成時に使用）
function getIssueDate() {
  return document.getElementById('issueDateDisplay')?.textContent || calcIssueDate('末日');
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
// 列ラベル取得（Excelのcolumnsから、なければデフォルト）
// 順序：作業日・サービス名・数量・単価・金額・備考（税率は固定・対象外）
function getColumnLabels() {
  const defaults = ['作業日','サービス名','数量','単価（円）','金額（円）','備考'];
  const cols = currentClient?.columns;
  if (!cols || cols.length === 0) return defaults;
  return defaults.map((def, i) => (cols[i] && cols[i].name) ? cols[i].name : def);
}  
function formatDate(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// カスタムトースト通知（ブラウザ標準alertの置き換え。ドメイン名が出ない）
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 2800);
}

// カスタム確認ダイアログ（ブラウザ標準confirmの置き換え。ドメイン名が出ない）
function showConfirm(msg, opts) {
  opts = opts || {};
  const okText = opts.okText || 'OK';
  const danger = !!opts.danger;
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-msg"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel">キャンセル</button>
          <button class="modal-btn ${danger ? 'modal-btn-danger' : 'modal-btn-ok'}">${escHtml(okText)}</button>
        </div>
      </div>`;
    overlay.querySelector('.modal-msg').textContent = msg;
    document.body.appendChild(overlay);
    const btns = overlay.querySelectorAll('.modal-btn');
    const close = (val) => { overlay.remove(); resolve(val); };
    btns[0].onclick = () => close(false);
    btns[1].onclick = () => close(true);
    overlay.onclick = (e) => { if (e.target === overlay) close(false); };
  });
}
function showError(msg) {
  document.getElementById('headerTitle').textContent = 'エラー';
  document.getElementById('mainBody').innerHTML = `<div class="error-box">${msg}</div>`;
}

init();
</script>
