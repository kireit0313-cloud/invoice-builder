<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書・請求書入力</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F9FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --ink: #1A202C;
  --ink-soft: #718096;
  --accent: #3B82F6;
  --danger: #EF4444;
  --success: #10B981;
}
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.header-sub {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 2px;
}
.body {
  padding: 2rem 1.5rem;
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1rem;
}

/* 明細テーブル */
.table-scroll {
  width: 100%;
  overflow-x: auto;
}
.items-table {
  width: 100%;
  min-width: 760px;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 2px solid var(--border);
  color: var(--ink-soft);
  font-weight: 500;
  white-space: nowrap;
}
.items-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.items-table input {
  width: 100%;
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  outline: none;
}
.items-table input:focus {
  border-color: var(--accent);
}
.items-table input[type="number"] {
  text-align: right;
}
.col-date    { width: 14%; }
.col-service { width: 24%; }
.col-qty     { width: 8%; }
.col-price   { width: 13%; }
.col-amount  { width: 13%; }
.col-remark  { width: 22%; }
.col-delete  { width: 6%; text-align: center; }

.delete-btn {
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: 4px;
}
.delete-btn:hover { color: var(--danger); }

.add-row-btn {
  margin-top: 1rem;
  padding: 8px 16px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  width: 100%;
}
.add-row-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* 合計エリア */
.totals {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 2px solid var(--border);
}
.total-row {
  display: flex;
  gap: 2rem;
  font-size: 13px;
  color: var(--ink-soft);
}
.total-row.grand {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.total-label { min-width: 80px; text-align: right; }
.total-value { min-width: 100px; text-align: right; }

/* アクションボタン */
.actions {
  display: flex;
  gap: 1rem;
  justify-content: flex-end;
}
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-secondary {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
}
.btn:hover { opacity: 0.85; }

/* ローディング・エラー */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--ink-soft);
  font-size: 14px;
}
.error-box {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  color: var(--danger);
  font-size: 14px;
}

/* 補足テキスト */
.hint {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 0.5rem;
}
</style>
<!-- Excel出力用ライブラリ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title" id="headerTitle">読み込み中...</div>
    <div class="header-sub">見積書・請求書入力</div>
  </div>
</div>

<div class="body" id="mainBody">
  <div class="loading">データを読み込んでいます...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATf8RjZ7y_wjiiPJ1VR9KXktbDPXuMpFo",
  authDomain: "idea-notebook-172e0.firebaseapp.com",
  projectId: "idea-notebook-172e0",
  storageBucket: "idea-notebook-172e0.firebasestorage.app",
  messagingSenderId: "682338340449",
  appId: "1:682338340449:web:598a4db429e148990e6420"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLのパラメータからクライアントIDを取得
const params = new URLSearchParams(window.location.search);
const clientId = params.get('id');

// メイン処理
async function init() {
  if (!clientId) {
    showError('クライアントIDが指定されていません。');
    return;
  }

  try {
    const snap = await getDoc(doc(db, 'clients', clientId));
    if (!snap.exists()) {
      showError(`クライアント「${clientId}」が見つかりません。`);
      return;
    }

    const client = snap.data();
    buildUI(client);
  } catch(e) {
    showError('データの読み込みに失敗しました：' + e.message);
  }
}

// UI構築
function buildUI(client) {
  document.getElementById('headerTitle').textContent = client.clientName + ' 様';
  document.title = client.clientName + ' 様 | 見積書・請求書入力';

  const body = document.getElementById('mainBody');
  body.innerHTML = `
    <!-- 明細入力カード -->
    <div class="card">
      <p class="card-title">明細を入力</p>
      <div class="table-scroll">
        <table class="items-table">
          <thead>
            <tr>
              <th class="col-date">作業日</th>
              <th class="col-service">サービス名</th>
              <th class="col-qty">数量</th>
              <th class="col-price">単価（円）</th>
              <th class="col-amount">金額（円）</th>
              <th class="col-remark">備考</th>
              <th class="col-delete"></th>
            </tr>
          </thead>
          <tbody id="itemsBody">
          </tbody>
        </table>
      </div>
      <p class="hint">作業日は「6/2」のような単日でも「6/2〜6/4」のような期間でも入力できます。数量と単価を入れると金額が自動計算されます。日割りできない場合は数量・単価を空欄のまま金額欄に直接金額を入力してください。</p>
      <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>

      <!-- 合計 -->
      <div class="totals">
        <div class="total-row">
          <span class="total-label">小計</span>
          <span class="total-value" id="subtotal">¥0</span>
        </div>
        <div class="total-row">
          <span class="total-label">消費税（10%）</span>
          <span class="total-value" id="tax">¥0</span>
        </div>
        <div class="total-row grand">
          <span class="total-label">合計</span>
          <span class="total-value" id="grandTotal">¥0</span>
        </div>
      </div>
    </div>

    <!-- アクションボタン -->
    <div class="actions">
      <button class="btn btn-secondary" onclick="exportExcel()">Excelで保存</button>
      <button class="btn btn-primary" onclick="exportPDF()">PDF出力</button>
    </div>
  `;

  // 最初の1行を追加
  addRow();
}

// 今日の日付をyyyy-mm-dd形式で返す
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// 行を追加
let rowCount = 0;
window.addRow = function() {
  rowCount++;
  const id = 'row_' + rowCount;
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML = `
    <td class="col-date">
      <input type="text" placeholder="例：6/2 や 6/2〜6/4">
    </td>
    <td class="col-service">
      <input type="text" placeholder="例：エアコン洗浄">
    </td>
    <td class="col-qty">
      <input type="number" placeholder="" min="0"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-price">
      <input type="number" placeholder="" min="0"
        oninput="calcRow('${id}')">
    </td>
    <td class="col-amount">
      <input type="number" placeholder="0" min="0"
        oninput="calcTotals()">
    </td>
    <td class="col-remark">
      <input type="text" placeholder="">
    </td>
    <td class="col-delete">
      <button class="delete-btn" onclick="deleteRow('${id}')">×</button>
    </td>
  `;
  document.getElementById('itemsBody').appendChild(tr);
  calcTotals();
};

// 行の入力欄を名前で取得
function rowInputs(row) {
  const inputs = row.querySelectorAll('input');
  return {
    date: inputs[0],
    service: inputs[1],
    qty: inputs[2],
    price: inputs[3],
    amount: inputs[4],
    remark: inputs[5],
  };
}

// 数量・単価が両方入力されていれば金額を自動計算
window.calcRow = function(id) {
  const row = document.getElementById(id);
  if (!row) return;
  const f = rowInputs(row);
  if (f.qty.value !== '' && f.price.value !== '') {
    const qty = parseFloat(f.qty.value) || 0;
    const price = parseFloat(f.price.value) || 0;
    f.amount.value = qty * price;
  }
  calcTotals();
};

// 合計を計算
window.calcTotals = function() {
  const rows = document.querySelectorAll('#itemsBody tr');
  let subtotal = 0;
  rows.forEach(row => {
    const f = rowInputs(row);
    subtotal += parseFloat(f.amount.value) || 0;
  });
  const tax = Math.floor(subtotal * 0.1);
  const grand = subtotal + tax;

  document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
  document.getElementById('tax').textContent = '¥' + tax.toLocaleString();
  document.getElementById('grandTotal').textContent = '¥' + grand.toLocaleString();
};

// 行を削除
window.deleteRow = function(id) {
  const row = document.getElementById(id);
  if (row) {
    row.remove();
    calcTotals();
  }
};

// エラー表示
function showError(msg) {
  document.getElementById('headerTitle').textContent = 'エラー';
  document.getElementById('mainBody').innerHTML =
    `<div class="error-box">${msg}</div>`;
}

init();

// Excel出力
window.exportExcel = function() {
  const rows = document.querySelectorAll('#itemsBody tr');
  const name = document.getElementById('headerTitle')?.textContent || 'document';

  const data = [['作業日', 'サービス名', '数量', '単価（円）', '金額（円）', '備考']];
  rows.forEach(row => {
    const f = rowInputs(row);
    data.push([
      f.date.value,
      f.service.value,
      f.qty.value === '' ? '' : parseFloat(f.qty.value) || 0,
      f.price.value === '' ? '' : parseFloat(f.price.value) || 0,
      parseFloat(f.amount.value) || 0,
      f.remark.value,
    ]);
  });

  const toNum = id => parseInt((document.getElementById(id)?.textContent || '0').replace(/[¥,]/g, '')) || 0;
  data.push([]);
  data.push(['', '', '', '', '小計', '¥' + toNum('subtotal').toLocaleString()]);
  data.push(['', '', '', '', '消費税（10%）', '¥' + toNum('tax').toLocaleString()]);
  data.push(['', '', '', '', '合計', '¥' + toNum('grandTotal').toLocaleString()]);

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 14 }, { wch: 26 }, { wch: 8 }, { wch: 12 }, { wch: 12 }, { wch: 20 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '明細');
  XLSX.writeFile(wb, `${name}_${todayStr()}.xlsx`);
};

// PDF出力（Cloud Run + Puppeteer）
const PDF_SERVER = 'https://invoice-pdf-server-682338340449.asia-northeast1.run.app';

window.exportPDF = async function() {
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'PDF生成中...';
  btn.disabled = true;

  try {
    // 明細データを収集
    const rows = document.querySelectorAll('#itemsBody tr');
    const items = [];
    rows.forEach(row => {
      const f = rowInputs(row);
      items.push({
        workDate: f.date.value,
        service:  f.service.value,
        qty:      f.qty.value === '' ? null : parseFloat(f.qty.value) || 0,
        price:    f.price.value === '' ? null : parseFloat(f.price.value) || 0,
        amount:   parseFloat(f.amount.value) || 0,
        remark:   f.remark.value,
      });
    });

    const clientName = document.getElementById('headerTitle')?.textContent?.replace(' 様', '') || '';

    // 合計値を取得（¥と,を除去して数値化）
    const toNum = id => parseInt((document.getElementById(id)?.textContent || '0').replace(/[¥,]/g, '')) || 0;

    const payload = {
      clientName,
      items,
      subtotal:   toNum('subtotal'),
      tax:        toNum('tax'),
      grandTotal: toNum('grandTotal'),
    };

    const res = await fetch(`${PDF_SERVER}/generate-pdf`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'サーバーエラー');
    }

    // PDFをダウンロード
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${clientName}_${todayStr()}.pdf`;
    a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    alert('PDF生成に失敗しました：' + e.message);
  } finally {
    btn.textContent = 'PDF出力';
    btn.disabled = false;
  }
};
</script>

</body>
</html>
