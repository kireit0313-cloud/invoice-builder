<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書・請求書メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F9FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --ink: #1A202C;
  --ink-soft: #718096;
  --accent: #3B82F6;
}
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  width: min(400px, 90vw);
  text-align: center;
}
.app-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}
.app-sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 2rem;
  line-height: 1.6;
}
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
}
.google-btn:hover { background: var(--bg); }
.status {
  margin-top: 1rem;
  font-size: 12px;
  color: var(--ink-soft);
}

/* ログイン後の画面 */
#app {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.welcome {
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
}
.welcome-sub {
  font-size: 13px;
  color: var(--ink-soft);
}
.logout-btn {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink-soft);
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-box">
    <p class="app-title">見積書・請求書メーカー</p>
    <p class="app-sub">Excelテンプレートから<br>かんたんにPDF作成</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </button>
    <p class="status" id="statusMsg"></p>
  </div>
</div>

<!-- ログイン後の画面（仮） -->
<div id="app">
  <p class="welcome" id="welcomeName"></p>
  <p class="welcome-sub">ログインできました</p>
  <button class="logout-btn" onclick="signOut()">ログアウト</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyATf8RjZ7y_wjiiPJ1VR9KXktbDPXuMpFo",
  authDomain: "idea-notebook-172e0.firebaseapp.com",
  projectId: "idea-notebook-172e0",
  storageBucket: "idea-notebook-172e0.firebasestorage.app",
  messagingSenderId: "682338340449",
  appId: "1:682338340449:web:598a4db429e148990e6420"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ログイン状態を監視
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('welcomeName').textContent = user.displayName + ' さん、こんにちは';
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.signInWithGoogle = async () => {
  document.getElementById('statusMsg').textContent = 'ログイン中...';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('statusMsg').textContent = 'エラー: ' + e.message;
  }
};

window.signOut = async () => {
  await fbSignOut(auth);
};
</script>

</body>
</html>
