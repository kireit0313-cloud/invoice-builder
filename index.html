<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書・請求書メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F9FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --ink: #1A202C;
  --ink-soft: #718096;
  --accent: #3B82F6;
}
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  width: min(400px, 90vw);
  text-align: center;
}
.app-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}
.app-sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 2rem;
  line-height: 1.6;
}
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
}
.google-btn:hover { background: var(--bg); }
.status {
  margin-top: 1rem;
  font-size: 12px;
  color: var(--ink-soft);
}

/* ログイン後の画面 */
#app {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.welcome {
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
}
.welcome-sub {
  font-size: 13px;
  color: var(--ink-soft);
}
.logout-btn {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink-soft);
}
  /* 管理画面レイアウト */
#app {
  align-items: stretch !important;
  justify-content: flex-start !important;
  background: var(--bg);
}
.admin-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.admin-header-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.admin-body {
  padding: 2rem 1.5rem;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1rem;
}
.upload-area {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 2;
}
.upload-btn {
  display: inline-block;
  margin-top: 0.75rem;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
}
.cols-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.cols-table th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  color: var(--ink-soft);
  font-weight: 500;
}
.cols-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
}
.save-btn {
  padding: 12px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  align-self: flex-end;
}
.hint {
  font-size: 12px;
  color: var(--ink-soft);
  text-align: center;
  padding: 1.5rem;
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-box">
    <p class="app-title">見積書・請求書メーカー</p>
    <p class="app-sub">Excelテンプレートから<br>かんたんにPDF作成</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </button>
    <p class="status" id="statusMsg"></p>
  </div>
</div>

<!-- ログイン後の管理画面 -->
<div id="app">
  <!-- ヘッダー -->
  <div class="admin-header">
    <span class="admin-header-title">見積書・請求書メーカー</span>
    <button class="logout-btn" onclick="signOut()">ログアウト</button>
  </div>

  <!-- メインコンテンツ -->
  <div class="admin-body">

    <!-- Excelアップロードカード -->
    <div class="card">
      <p class="card-title">① Excelテンプレートをアップロード</p>
      <div class="upload-area">
        <div>📁 Excelファイル（.xlsx）をここに選択</div>
        <div style="font-size:11px; margin-top:4px;">対応形式：.xlsx / .xls</div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
          ファイルを選択
        </button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
      </div>
    </div>

    <!-- 列確認テーブルカード（初期は非表示） -->
    <div class="card" id="colsCard" style="display:none">
      <p class="card-title">② 列の種類を確認・修正</p>
      <table class="cols-table">
        <thead>
          <tr>
            <th>列名（Excelの1行目）</th>
            <th>自動判定された種類</th>
          </tr>
        </thead>
        <tbody id="colsBody">
          <!-- JavaScriptで行を追加予定 -->
        </tbody>
      </table>
    </div>

    <!-- 保存ボタン（初期は非表示） -->
    <button class="save-btn" id="saveBtn" style="display:none">
      設定を保存する
    </button>

    <!-- アップロード前のヒント -->
    <p class="hint" id="hintMsg">
      Excelファイルをアップロードすると、列が自動で判定されます
    </p>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyATf8RjZ7y_wjiiPJ1VR9KXktbDPXuMpFo",
  authDomain: "idea-notebook-172e0.firebaseapp.com",
  projectId: "idea-notebook-172e0",
  storageBucket: "idea-notebook-172e0.firebasestorage.app",
  messagingSenderId: "682338340449",
  appId: "1:682338340449:web:598a4db429e148990e6420"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ログイン状態を監視
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('welcomeName').textContent = user.displayName + ' さん、こんにちは';
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.signInWithGoogle = async () => {
  document.getElementById('statusMsg').textContent = 'ログイン中...';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('statusMsg').textContent = 'エラー: ' + e.message;
  }
};

window.signOut = async () => {
  await fbSignOut(auth);
};
  // ========== ステップ6：Excel読み込み ==========

// ファイルが選択されたときに発動
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // SheetJSでExcelを読み込む
  const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");
  const buffer = await file.arrayBuffer();
const data = new Uint8Array(buffer);
const workbook = XLSX.read(data, { type: 'array' });

  // 最初のシートを取得
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  // 1行目のヘッダーだけ取得
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
  const headers = rows[0] || [];

  // 列テーブルを表示
  showColumnsTable(headers);
});

// 列名から種類を自動判定する関数
function detectType(colName) {
  const name = colName.toString().toLowerCase();
  if (/品名|商品名|内容|item/.test(name))   return 'テキスト入力';
  if (/数量|個数|qty|count/.test(name))     return '数値入力';
  if (/単価|金額|price|amount/.test(name))  return '金額入力（カンマ区切り）';
  if (/日付|date/.test(name))              return '日付ピッカー';
  if (/備考|メモ|note|remark/.test(name))  return '複数行テキスト';
  return 'テキスト入力';  // 判定できなければテキスト入力にする
}

// テーブルに列を表示する関数
function showColumnsTable(headers) {
  const tbody = document.getElementById('colsBody');
  tbody.innerHTML = '';  // 一旦クリア

  headers.forEach(header => {
    const type = detectType(header);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${header}</td>
      <td>${type}</td>
    `;
    tbody.appendChild(tr);
  });

  // テーブルと保存ボタンを表示、ヒントを非表示に
  document.getElementById('colsCard').style.display = 'block';
  document.getElementById('saveBtn').style.display = 'block';
  document.getElementById('hintMsg').style.display = 'none';
}
</script>

</body>
</html>
